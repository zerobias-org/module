name: Image Publish

on:
  repository_dispatch:
    types:
      - image-publish

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

jobs:
  image-publish:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        package: ${{ github.event.client_payload.packages }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main
      - uses: zerobias-org/devops/nx-actions/setup-node@main
      - name: Import Secrets
        uses: hashicorp/vault-action@v2.4.3
        with:
          method: jwt
          url: ${{ secrets.VAULT_ADDR }}
          role: publishing-role
          path: gh-actions
          secrets: |
            operations-kv/data/ci/github readPackagesToken | NPM_TOKEN;
            operations-kv/data/ci/slack devopsNotifications | SLACK_DEVOPS_NOTIFICATIONS;
            operations-kv/data/ci/github dispatchToken | DISPATCH_TOKEN;
            operations-kv/data/ci/slack releasesWebhook | SLACK_RELEASES_WEBHOOK;
            operations-kv/data/ci/github username | USERNAME ;
            operations-kv/data/ci/github writePackagesToken | WRITE_TOKEN ;
            operations-kv/data/ci/github zb-token | ZB_TOKEN;

      - name: configure aws tools creds
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::961260934100:role/github-actions-publishing-role
          role-session-name: ${{ github.event.repository.name }}
          aws-region: us-east-1

      - name: save tools profile
        shell: bash
        run: |
          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID --profile tools
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY --profile tools
          aws configure set aws_session_token $AWS_SESSION_TOKEN --profile tools

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ env.USERNAME }}
          password: ${{ env.WRITE_TOKEN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          platforms: linux/amd64,linux/arm64

      - name: Build images
        id: build
        shell: bash
        env:
          ZB_TOKEN: ${{ env.ZB_TOKEN }}
        run: |
          npm ci
          ./scripts/imagepublish.sh ${{ matrix.package }}

      - name: Extract package info
        id: pkg_info
        if: success() && steps.build.outputs.PUBLISHED == 'true'
        shell: bash
        run: |
          # Extract package name without scope and version (e.g., @zerobias-org/module-name@1.0.0 -> module-name)
          PKG_NAME=$(echo "${{ matrix.package }}" | sed 's/@[^/]*\///' | sed 's/@.*//')
          echo "name=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "changelog_url=https://github.com/${{ github.repository }}/blob/main/packages/${PKG_NAME}/CHANGELOG.md" >> $GITHUB_OUTPUT

      - name: Slack Notification
        uses: slackapi/slack-github-action@v2.1.1
        if: success() && steps.build.outputs.PUBLISHED == 'true'
        with:
          webhook: ${{ env.SLACK_RELEASES_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: "New ${{ github.repository }} Image Published"
            attachments:
              - color: "#36a64f"
                fallback: "New Module Image Published"
                title: ":robot: New Image Published :tada:"
                text: "Published by *@${{ github.actor }}*\n\n*:gear: Image*\n• `${{ matrix.package }}` <${{ steps.pkg_info.outputs.changelog_url }}|changelog>"
                footer: "<https://github.com/${{ github.repository }}|${{ github.repository }}> • <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                mrkdwn_in:
                  - text
                  - footer

      - name: Slack Notification on failure
        uses: slackapi/slack-github-action@v2.1.1
        if: failure() && env.SLACK_DEVOPS_NOTIFICATIONS != ''
        with:
          webhook: ${{ env.SLACK_DEVOPS_NOTIFICATIONS }}
          webhook-type: incoming-webhook
          payload: |
            text: "${{ github.repository }} Image Publish Failed"
            attachments:
              - color: "#ff0000"
                fallback: "Image Publish Failed"
                title: ":fire: Image Publish Failed"
                text: "Triggered by *@${{ github.actor }}*\n\n*:gear: Image*\n• `${{ matrix.package }}`"
                footer: "<https://github.com/${{ github.repository }}|${{ github.repository }}> • <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                mrkdwn_in:
                  - text
                  - footer
