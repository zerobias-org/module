name: Publish Module

on:
  push:
    branches: [main, qa, dev, uat]
    paths:
      - 'package/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish (e.g. github/github). Leave blank for all changed.'
        required: false

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  publish:
    uses: zerobias-org/devops/.github/workflows/zbb-publish-reusable.yml@main
    with:
      package-depth: 2
      ghcr-namespace: zerobias-org
      dispatch-input-name: module
      dispatch-input-value: ${{ inputs.module }}
    secrets: inherit
