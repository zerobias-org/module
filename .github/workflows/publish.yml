name: Publish Module

on:
  push:
    branches: [main, qa, dev, uat]
    paths:
      - 'package/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish (e.g. github/github). Leave blank for all changed.'
        required: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ZB_TOKEN: ${{ secrets.ZB_TOKEN }}
  AWS_REGION: us-east-1
  ECR_REGISTRY: 961260934100.dkr.ecr.us-east-1.amazonaws.com
  GHCR_REGISTRY: ghcr.io/zerobias-org
  NEON_PARENT_BRANCH: content-master
  NEON_DB_ROLE: neondb_owner
  NEON_DB_NAME: zerobias
  CI: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.changed.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: changed
        run: |
          if [ -n "${{ inputs.module }}" ]; then
            echo "modules=[\"${{ inputs.module }}\"]" >> $GITHUB_OUTPUT
            echo "Manual dispatch: ${{ inputs.module }}"
            exit 0
          fi

          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$BRANCH" = "main" ]; then
            BASE_REF=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$BASE_REF" ]; then
              echo "No tags found — publishing all modules"
              MODULES=$(find package -name "build.gradle.kts" -mindepth 3 -maxdepth 3 | \
                sed 's|^package/||; s|/build.gradle.kts||' | \
                jq -R -s -c 'split("\n") | map(select(length > 0))')
              echo "modules=$MODULES" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            BASE_REF="origin/main"
          fi

          echo "Comparing against: $BASE_REF"

          # For each changed file under package/, walk up to find build.gradle.kts
          MODULES="[]"
          for file in $(git diff --name-only "$BASE_REF" HEAD -- 'package/'); do
            dir="$file"
            while [ "$dir" != "package" ] && [ "$dir" != "." ]; do
              dir=$(dirname "$dir")
              if [ -f "$dir/build.gradle.kts" ]; then
                mod=$(echo "$dir" | sed 's|^package/||')
                MODULES=$(echo "$MODULES" | jq -c "if index(\"$mod\") then . else . + [\"$mod\"] end")
                break
              fi
            done
          done

          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "Changed modules: $MODULES"

  # Single-writer version job. Bumps every changed module's package.json +
  # gate-stamp.json in one commit and pushes once, BEFORE the publish matrix
  # fans out. Without this, every matrix job would race on `git push` to main.
  # Outputs the resulting SHA so the matrix checks out the bumped state.
  version:
    needs: detect
    if: needs.detect.outputs.modules != '[]' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configure git user
        run: |
          git config --global user.email "ci@neverfail.com"
          git config --global user.name "@$GITHUB_ACTOR"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install global tools
        run: |
          cp .npmrc $HOME/.npmrc
          npm i -g @zerobias-org/zbb

      - name: Bump versions
        id: bump
        run: |
          # detect emits a JSON array (["foo/bar","baz/qux"]); zbb expects a
          # comma-separated list. Convert with jq.
          MODULES=$(echo '${{ needs.detect.outputs.modules }}' | jq -r 'join(",")')
          echo "Versioning: $MODULES"
          zbb version --modules="$MODULES"
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  publish:
    needs: [detect, version]
    if: needs.detect.outputs.modules != '[]'
    runs-on: ubuntu-latest
    env:
      # Phase 3: ephemeral slot for this CI publish run.
      ZB_SLOT: ci-${{ github.run_id }}-${{ github.run_attempt }}
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # Pick up the version-bump commit produced by the `version` job.
          # On non-main branches the version job is skipped, so fall back to
          # the triggering ref.
          ref: ${{ needs.version.outputs.sha || github.sha }}

      # -- Vault: authenticate via GitHub OIDC and fetch credentials --
      - name: Authenticate to Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          role: publishing-role
          path: gh-actions
          secrets: |
            operations-kv/data/ci/github writePackagesToken | NPM_TOKEN;
            operations-kv/data/ci/github readPackagesToken | READ_TOKEN;
            aws-auth/tools/ecr/creds/ecr-push access_key | AWS_ACCESS_KEY_ID;
            aws-auth/tools/ecr/creds/ecr-push secret_key | AWS_SECRET_ACCESS_KEY;
            operations-kv/data/neon/content api-key | NEON_API_KEY;
            operations-kv/data/neon/content project-id | NEON_PROJECT_ID;

      # -- Tool setup --
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Configure git user
        run: |
          git config --global user.email "ci@neverfail.com"
          git config --global user.name "@$GITHUB_ACTOR"

      # -- Registry logins using Vault-provided credentials --
      # AWS IAM eventual consistency: freshly generated credentials may take
      # a few seconds to propagate. Retry with backoff.
      - name: Login to ECR
        run: |
          for i in 1 2 3 4 5; do
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }} && break
            echo "ECR login attempt $i failed — waiting ${i}0s for IAM propagation..."
            sleep ${i}0
          done

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ env.NPM_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          platforms: linux/amd64,linux/arm64
          install: true

      - name: Bootstrap buildx
        run: docker buildx inspect --bootstrap

      - name: Install global tools
        run: |
          cp .npmrc $HOME/.npmrc
          cp .npmrc $NPM_CONFIG_USERCONFIG
          npm i -g @zerobias-org/zbb
          npm i -g @zerobias-com/platform-dataloader

      - name: Make gradlew executable
        run: chmod +x gradlew

      # -- Install dependencies (CI starts from clean checkout) --
      - name: Install dependencies
        run: |
          cd package/${{ matrix.module }}
          cp $HOME/.npmrc .npmrc
          npm ci

      # Bootstrap an ephemeral slot for this CI run. CI mode (auto-detected
      # from CI=true) snapshots process.env as slot overrides — vault
      # secrets exported above are picked up directly.
      # IMPORTANT: do NOT override NPM_TOKEN here — the vault step above
      # exported the WRITE token as NPM_TOKEN. Overriding it with
      # READ_TOKEN would snapshot the read token into the slot, and
      # prepareSlot() would re-export it over the write token during publish.
      - name: Bootstrap zbb slot
        run: |
          zbb slot create $ZB_SLOT --ephemeral
          zbb stack add .
        env:
          CI: 'true'

      # -- Publish: preflight verifies gate stamp, skips tests, builds + publishes --
      # versionAlreadyCommitted=true: the `version` job already wrote and pushed
      # the version-bump commit, so commitVersion / pushVersion in this matrix
      # run are no-ops. tagVersion + pushTag still fire per-matrix because each
      # tag is a unique ref → no race on tag push.
      - name: Publish ${{ matrix.module }}
        run: |
          cd package/${{ matrix.module }}
          zbb publish -PversionAlreadyCommitted=true

      # -- Generate packages file for release announcement --
      - name: Generate packages file
        if: success()
        run: |
          cd package/${{ matrix.module }}
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "[{\"name\":\"$NAME\",\"version\":\"$VERSION\",\"location\":\"$(pwd)\"}]" > /tmp/published-packages.json

      # -- Release announcement: Slack + event router --
      - name: Release Announcement
        if: success()
        uses: zerobias-org/devops/nx-actions/release-announcement@main
        with:
          packages-file: /tmp/published-packages.json
          branch: ${{ github.ref_name }}
          dist-tag: ${{ github.ref_name == 'main' && 'latest' || github.ref_name == 'qa' && 'rc' || github.ref_name == 'dev' && 'dev' || 'uat' }}
        env:
          SLACK_RELEASES_WEBHOOK: ${{ secrets.SLACK_RELEASES_WEBHOOK }}
          SLACK_DEVOPS_NOTIFICATIONS: ${{ secrets.SLACK_DEVOPS_NOTIFICATIONS }}
          READ_TOKEN: ${{ env.READ_TOKEN }}

  # Sync main → uat → qa → dev after successful publish (separate job = clean checkout)
  sync:
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync branches
        uses: zerobias-org/devops/nx-actions/sync-branches@main
        with:
          branch: ${{ github.ref_name }}

