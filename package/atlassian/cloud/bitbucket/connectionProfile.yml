# Connection Profile for Atlassian Bitbucket Cloud
#
# Authentication Method: HTTP Basic Authentication
# - Username: Atlassian account email
# - Password: API token (ATATT3x* format)
# - Pattern: Authorization: Basic base64(email:apiToken)
#
# Design Decision: Custom profile (not extending core profile)
# - basicConnection.yml requires 'uri' (unnecessary - Bitbucket has fixed base URL)
# - tokenProfile.yml lacks 'email' field
# - Clean fit: email + apiToken for Basic Auth
#
# API Token Creation:
# 1. Log into https://bitbucket.org/
# 2. Go to Personal Settings > App passwords
# 3. Create app password with required scopes
# 4. Use the generated token (ATATT3x* format) as apiToken

type: object
description: Connection profile for Atlassian Bitbucket Cloud
properties:
  email:
    type: string
    format: email
    description: The Atlassian account email address to use for authentication
    example: user@example.com
  apiToken:
    type: string
    format: password
    description: The Bitbucket App Password (API token) for authentication
    example: ATATT3xFfGF0T_example_token_here
required:
  - email
  - apiToken
