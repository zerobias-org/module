# Plain-HTTP operations config, used when HUB_NODE_INSECURE=true (local/dev,
# health-checked over HTTP). startup.sh selects this file instead of nginx.conf;
# no runtime rewriting. nginx fronts ONLY the operations port (8888 -> 127.0.0.1:8889);
# the MLLP listener is served directly by the Java process.

worker_processes 1;
daemon off;  # Run in foreground (required for Docker)
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    access_log /var/log/nginx/access.log;

    upstream java_app {
        server 127.0.0.1:8889;
        keepalive 32;
    }

    server {
        listen 8888 default_server;
        server_name localhost;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        location / {
            proxy_pass http://java_app;
        }
    }
}
