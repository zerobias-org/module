# nginx configuration for the HL7 v2 Receiver Module.
# Provides SSL termination and proxying to the Java operations server.
# NOTE: nginx fronts ONLY the operations port (8888 -> 127.0.0.1:8889).
# The MLLP listener port is served directly by the Java process, not proxied.

worker_processes 1;
daemon off;  # Run in foreground (required for Docker)
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    access_log /var/log/nginx/access.log;

    upstream java_app {
        server 127.0.0.1:8889;
        keepalive 32;
    }

    # HTTPS server (default)
    server {
        listen 8888 ssl http2 default_server;
        server_name localhost;

        ssl_certificate /opt/module/ssl/cert.pem;
        ssl_certificate_key /opt/module/ssl/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        location / {
            proxy_pass http://java_app;
        }
    }

    # HTTP server (used when HUB_NODE_INSECURE=true; enabled by startup.sh)
    # INCLUDE_HTTP_SERVER_START
    # server {
    #     listen 8888 default_server;
    #     server_name localhost;
    #
    #     proxy_http_version 1.1;
    #     proxy_set_header Connection "";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_buffering off;
    #
    #     proxy_connect_timeout 60s;
    #     proxy_send_timeout 300s;
    #     proxy_read_timeout 300s;
    #
    #     location / {
    #         proxy_pass http://java_app;
    #     }
    # }
    # INCLUDE_HTTP_SERVER_END
}
